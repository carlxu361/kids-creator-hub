<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 小创客冒险之旅</title>
<link rel="stylesheet" href="css/styles.css">
<style>
/* ==================== VARIABLES ==================== */
:root {
    --primary:#6c5ce7;--success:#00b894;--warning:#fdcb6e;--danger:#e17055;--info:#74b9ff;
    --bg:#0a0a23;--card:#1a1a3e;--card2:#12122e;--text:#f5f5f5;--dim:#8888aa;
    --glow:rgba(108,92,231,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ==================== STARS ==================== */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1.2)}}

/* ==================== TOP BAR ==================== */
.top-bar{position:sticky;top:0;z-index:100;background:rgba(10,10,35,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(108,92,231,.25);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.top-bar .logo{font-size:1.25em;font-weight:700;background:linear-gradient(135deg,#a29bfe,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.stats{display:flex;gap:18px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:5px;font-size:.88em;color:var(--dim)}
.stat .n{color:var(--warning);font-weight:700;font-size:1.05em}

/* XP BAR */
.xp-wrap{padding:0 20px}
.xp-bar{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#6c5ce7,#a29bfe,#fd79a8);border-radius:4px;transition:width .8s;position:relative}
.xp-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.xp-label{text-align:right;font-size:.75em;color:var(--dim);margin-top:3px}

/* ==================== LAYOUT ==================== */
.main{position:relative;z-index:1;display:flex;min-height:calc(100vh - 70px)}

/* LEFT MAP */
.map{width:300px;min-width:300px;padding:14px;overflow-y:auto;max-height:calc(100vh - 70px);position:sticky;top:70px}
.map::-webkit-scrollbar{width:4px}.map::-webkit-scrollbar-thumb{background:rgba(108,92,231,.4);border-radius:2px}

.lvl{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:6px;border-radius:12px;cursor:pointer;transition:all .25s;border:2px solid transparent;position:relative}
.lvl:hover{background:rgba(108,92,231,.12);transform:translateX(3px)}
.lvl.on{background:rgba(108,92,231,.18);border-color:var(--primary);box-shadow:0 0 16px var(--glow)}
.lvl .ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4em;flex-shrink:0;position:relative}
.lvl .badge{position:absolute;top:-3px;right:-3px;width:20px;height:20px;background:var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65em;border:2px solid var(--bg);animation:pop .35s}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.lvl .info{flex:1;min-width:0}
.lvl .t{font-weight:600;font-size:.95em;margin-bottom:2px}
.lvl .s{font-size:.78em;color:var(--dim)}
.lvl::before{content:'';position:absolute;left:37px;top:-6px;width:2px;height:6px;background:rgba(108,92,231,.3)}
.lvl:first-child::before{display:none}

/* auto-verify indicator */
.lvl .verify-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lvl .verify-dot.ok{background:var(--success);box-shadow:0 0 6px var(--success)}
.lvl .verify-dot.partial{background:var(--warning)}
.lvl .verify-dot.none{background:rgba(255,255,255,.15)}

/* RIGHT CONTENT */
.content{flex:1;padding:20px 28px;overflow-y:auto;max-height:calc(100vh - 70px)}
.content::-webkit-scrollbar{width:5px}.content::-webkit-scrollbar-thumb{background:rgba(108,92,231,.4);border-radius:3px}

/* level header */
.hdr{margin-bottom:24px;animation:slideUp .4s}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hdr .bc{font-size:.82em;color:var(--dim);margin-bottom:6px}
.hdr h1{font-size:1.8em;margin-bottom:8px;background:linear-gradient(135deg,#a29bfe,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .desc{font-size:1em;color:var(--dim);line-height:1.7;margin-bottom:12px}
.chips{display:flex;gap:10px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:16px;font-size:.82em;background:rgba(255,255,255,.07);color:var(--dim)}

/* section titles */
.sec{margin-bottom:24px;animation:slideUp .4s}
.sec-t{font-size:1.15em;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ==================== STEP CARDS ==================== */
.step{background:var(--card);border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid rgba(255,255,255,.05);transition:all .25s}
.step:hover{border-color:rgba(108,92,231,.25)}
.step.done{border-color:rgba(0,184,148,.25)}
.step-h{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.step-chk{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;flex-shrink:0;font-size:.82em}
.step-chk:hover{border-color:var(--success);background:rgba(0,184,148,.1)}
.step-chk.auto-ok{background:var(--success);border-color:var(--success);animation:pop .3s}
.step-chk.manual-ok{background:var(--info);border-color:var(--info)}
.step-num{width:28px;height:28px;border-radius:7px;background:rgba(108,92,231,.18);display:flex;align-items:center;justify-content:center;font-size:.8em;font-weight:700;color:#a29bfe;flex-shrink:0}
.step-t{flex:1;font-weight:500}
.step-tag{font-size:.72em;padding:2px 8px;border-radius:8px;flex-shrink:0}
.step-tag.auto{background:rgba(0,184,148,.15);color:var(--success)}
.step-tag.manual{background:rgba(116,185,255,.15);color:var(--info)}
.step-arrow{color:var(--dim);transition:transform .25s;font-size:.75em}
.step.expanded .step-arrow{transform:rotate(90deg)}
.step-b{display:none;padding:0 16px 16px 74px;line-height:1.8;color:var(--dim);font-size:.93em}
.step.expanded .step-b{display:block;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.step-b p{margin-bottom:8px}

/* verify bar inside step */
.verify-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card2);border-radius:8px;margin:10px 0;font-size:.88em}
.verify-bar .v-icon{font-size:1.1em}
.verify-bar .v-text{flex:1}
.verify-bar .v-btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.82em;transition:all .2s}
.verify-bar .v-btn.check{background:rgba(108,92,231,.2);color:#a29bfe}
.verify-bar .v-btn.check:hover{background:rgba(108,92,231,.35)}
.verify-bar.ok{background:rgba(0,184,148,.1);border:1px solid rgba(0,184,148,.2)}
.verify-bar.fail{background:rgba(225,112,85,.1);border:1px solid rgba(225,112,85,.2)}
.verify-bar.pending{background:rgba(253,203,110,.1);border:1px solid rgba(253,203,110,.2)}

/* code blocks */
.code{background:#0d0d2b;border-radius:10px;padding:14px 16px;margin:10px 0;font-family:"SF Mono","Fira Code",Menlo,monospace;font-size:.87em;line-height:1.7;overflow-x:auto;position:relative;border:1px solid rgba(108,92,231,.18)}
.code .lbl{position:absolute;top:7px;right:10px;font-size:.72em;color:var(--dim);background:rgba(108,92,231,.18);padding:2px 7px;border-radius:4px}
.code .cp{position:absolute;top:7px;right:70px;background:rgba(255,255,255,.08);border:none;color:var(--dim);padding:3px 9px;border-radius:5px;cursor:pointer;font-size:.72em;transition:all .2s}
.code .cp:hover{background:rgba(108,92,231,.35);color:#fff}

/* tip boxes */
.tip{background:rgba(116,185,255,.08);border-left:3px solid var(--info);border-radius:0 8px 8px 0;padding:12px 14px;margin:10px 0;font-size:.88em}
.tip.warn{background:rgba(253,203,110,.08);border-color:var(--warning)}
.tip.ok{background:rgba(0,184,148,.08);border-color:var(--success)}

/* AI hint */
.ai{background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(253,121,168,.12));border-radius:10px;padding:14px 16px;margin:10px 0;display:flex;gap:10px;align-items:flex-start}
.ai .ai-i{font-size:1.2em;flex-shrink:0}
.ai .ai-t{font-size:.88em;color:var(--dim);line-height:1.6}
.ai .ai-t strong{color:#a29bfe}

/* quick buttons */
.qbtns{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.qbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;background:rgba(108,92,231,.12);border:1px solid rgba(108,92,231,.25);color:#a29bfe;cursor:pointer;font-size:.87em;transition:all .2s;text-decoration:none}
.qbtn:hover{background:rgba(108,92,231,.28);transform:translateY(-2px)}
.qbtn.pri{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border:none}

/* ==================== ANIMATED DEMOS ==================== */
.demo{background:var(--card2);border-radius:12px;padding:18px;margin:12px 0;overflow:hidden;position:relative}
.demo-title{font-size:.9em;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.demo-stage{position:relative;height:200px;background:rgba(0,0,0,.3);border-radius:8px;overflow:hidden}

/* scratch demo */
.scratch-demo{position:relative;width:100%;height:100%}
.scratch-cat{position:absolute;bottom:30px;left:50px;font-size:2.5em;transition:all .5s ease-in-out}
.scratch-ball{position:absolute;top:10px;font-size:1.8em;transition:all .05s linear}
.scratch-score{position:absolute;top:8px;right:12px;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:6px;font-size:.85em}
.scratch-blocks{position:absolute;bottom:8px;left:8px;display:flex;gap:4px;flex-wrap:wrap}
.scratch-block{padding:3px 8px;border-radius:4px;font-size:.65em;font-weight:600}
.sb-event{background:#e8a000;color:#fff}
.sb-motion{background:#4c97ff;color:#fff}
.sb-control{background:#ffab19;color:#fff}
.sb-looks{background:#9966ff;color:#fff}

/* terminal demo */
.term-demo{font-family:"SF Mono",Menlo,monospace;font-size:.82em;padding:12px}
.term-line{opacity:0;animation:typeIn .3s forwards;margin-bottom:4px}
.term-line .prompt{color:var(--success)}
.term-line .cmd{color:#fff}
.term-line .out{color:var(--dim)}
@keyframes typeIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* python turtle demo */
.turtle-demo{position:relative;width:100%;height:100%}
.turtle-canvas{position:absolute;inset:0}
.turtle-path{stroke:var(--primary);stroke-width:2;fill:none;stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawPath 3s ease forwards}
@keyframes drawPath{to{stroke-dashoffset:0}}
.turtle-dot{position:absolute;width:12px;height:12px;border-radius:50%;animation:pop .5s ease forwards;opacity:0}
.turtle-dot:nth-child(2){animation-delay:.5s}.turtle-dot:nth-child(3){animation-delay:1s}
.turtle-dot:nth-child(4){animation-delay:1.5s}.turtle-dot:nth-child(5){animation-delay:2s}
.turtle-dot:nth-child(6){animation-delay:2.5s}

/* ==================== MULTIDISCIPLINARY BADGE ==================== */
.subject{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:.75em;margin:2px}
.subject.math{background:rgba(116,185,255,.15);color:var(--info)}
.subject.chinese{background:rgba(253,121,168,.15);color:#fd79a8}
.subject.english{background:rgba(108,92,231,.15);color:#a29bfe}
.subject.science{background:rgba(0,184,148,.15);color:var(--success)}
.subject.art{background:rgba(253,203,110,.15);color:var(--warning)}

/* ==================== COMPLETE BTN ==================== */
.done-sec{text-align:center;padding:24px;margin-top:16px}
.done-btn{padding:14px 36px;border-radius:12px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;font-size:1.05em;font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 4px 14px rgba(0,184,148,.3)}
.done-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,184,148,.35)}
.done-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.done-btn.completed{background:linear-gradient(135deg,#636e72,#b2bec3)}

/* TOAST */
.toast{position:fixed;top:80px;right:20px;background:var(--card);border:1px solid rgba(0,184,148,.35);border-radius:10px;padding:14px 20px;z-index:200;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateX(130%);transition:transform .35s}
.toast.show{transform:translateX(0)}

/* CONFETTI */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:300}
.c-piece{position:absolute;top:-10px;animation:cFall var(--d) linear forwards}
@keyframes cFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* WELCOME */
.welcome{text-align:center;padding:50px 30px;animation:slideUp .5s}
.welcome h1{font-size:2.2em;margin-bottom:12px;background:linear-gradient(135deg,#a29bfe,#fd79a8,#fdcb6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{font-size:1.05em;color:var(--dim);line-height:1.8;max-width:560px;margin:0 auto 24px}
.welcome .go{padding:16px 44px;border-radius:14px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border:none;font-size:1.1em;font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 4px 18px rgba(108,92,231,.35)}
.welcome .go:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(108,92,231,.4)}
.float-emoji{font-size:5em;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* kbd */
kbd{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:1px 6px;font-size:.85em;font-family:inherit}

/* responsive */
@media(max-width:900px){
    .main{flex-direction:column}
    .map{width:100%;min-width:unset;max-height:180px;position:relative;top:0;display:flex;overflow-x:auto;gap:6px;padding:10px}
    .lvl{min-width:180px;margin-bottom:0}.lvl::before{display:none}
    .content{max-height:unset;padding:14px}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti" id="confetti"></div>
<div class="toast" id="toast"><span id="toastI">🎉</span><span id="toastT"></span></div>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="logo">🎮 小创客冒险之旅</div>
    <div class="stats">
        <div class="stat">⭐ 经验 <span class="n" id="xp">0</span></div>
        <div class="stat">🏆 成就 <span class="n" id="badges">0</span>/10</div>
        <div class="stat">📁 作品 <span class="n" id="works">0</span></div>
        <div class="stat"><button class="qbtn" onclick="refreshAll()" style="padding:4px 10px;font-size:.8em">🔄 刷新验证</button></div>
        <div class="stat"><button class="qbtn" onclick="Friends.showFriendModal()" style="padding:4px 10px;font-size:.8em">👥 好友</button></div>
        <div class="stat"><button class="qbtn" onclick="Leaderboard.showModal()" style="padding:4px 10px;font-size:.8em">🏆 排行</button></div>
        <div class="stat"><button class="qbtn" id="soundBtn" onclick="toggleSound()" style="padding:4px 10px;font-size:.8em" title="开关音效">🔊 音效</button></div>
    </div>
</div>
<div class="xp-wrap">
    <div class="xp-bar"><div class="xp-fill" id="xpF" style="width:0"></div></div>
    <div class="xp-label" id="xpL">0 / 5000 XP</div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="map" id="map"></div>
    <div class="content" id="content">
        <div class="welcome">
            <div class="float-emoji">🚀</div>
            <h1>欢迎来到小创客冒险之旅！</h1>
            <p>像玩游戏一样学编程！每完成一个关卡，系统会自动检测你的作品，获得经验值和成就徽章。</p>
            <button class="go" onclick="selectLevel(1)">🎯 开始第1关</button>
        </div>
    </div>
</div>

<script>
// ==================== LEVEL DATA ====================
const L = [
{
    id:1, icon:'🏠', title:'创客基地搭建', time:'30分钟', difficulty:'入门', xp:100,
    desc:'认识电脑上所有工具，知道每个工具是干什么的。就像探险家出发前要先认识自己的装备！',
    subjects:['🖥️ 信息科技'],
    steps:[
        {title:'认识终端（Terminal）',auto:true,
        verify:{id:'v1_terminal',label:'打开过终端并执行过命令',hint:'打开终端，输入 echo "你好" 然后回车'},
        subjects:['🖥️ 信息科技'],
        content:`
<p><strong>终端是什么？</strong>终端就像一个"魔法对话框"，你可以用文字命令控制电脑。</p>
<div class="qbtns"><a class="qbtn pri" onclick="runCmd('open -a Terminal')">🚀 打开终端</a></div>
<p>打开后，试试输入以下命令：</p>
<div class="code"><span class="lbl">终端</span><button class="cp" onclick="copyCode(this)">复制</button>
echo "你好，我是小创客！"
date
whoami</div>
<div class="demo">
    <div class="demo-title">🎬 动画演示：在终端输入命令</div>
    <div class="demo-stage">
        <div class="term-demo" id="termDemo">
            <div class="term-line" style="animation-delay:.3s"><span class="prompt">❯ </span><span class="cmd">echo "你好，我是小创客！"</span></div>
            <div class="term-line" style="animation-delay:.8s"><span class="out">你好，我是小创客！</span></div>
            <div class="term-line" style="animation-delay:1.3s"><span class="prompt">❯ </span><span class="cmd">date</span></div>
            <div class="term-line" style="animation-delay:1.8s"><span class="out">2026年 6月 1日 星期日 10时30分00秒 CST</span></div>
            <div class="term-line" style="animation-delay:2.3s"><span class="prompt">❯ </span><span class="cmd">whoami</span></div>
            <div class="term-line" style="animation-delay:2.8s"><span class="out">xiaochuangke</span></div>
        </div>
    </div>
</div>
<div class="ai"><span class="ai-i">🤖</span><div class="ai-t">不懂这些命令？在终端输入 <strong>claude</strong> 启动AI助手，然后问它："echo命令是干什么的？用小学生能懂的话解释"</div></div>
<div class="sec"><div class="sec-t">📐 数学小知识</div>
<div class="tip"><strong>坐标系</strong>：电脑屏幕用(x, y)坐标来定位。左上角是(0,0)，向右x增大，向下y增大。这跟你数学课学的坐标系一样！不过数学里y轴是向上的，电脑里是向下的。</div></div>`},
        {title:'认识VS Code',auto:true,
        verify:{id:'v1_vscode',label:'VS Code 已安装并可用',hint:'在终端输入 code 打开VS Code'},
        subjects:['🖥️ 信息科技'],
        content:`
<p><strong>VS Code是什么？</strong>写代码的"超级笔记本"，全世界数百万程序员都在用！</p>
<div class="qbtns"><a class="qbtn pri" onclick="runCmd('code')">🚀 打开VS Code</a></div>
<p>打开后，按 <kbd>Cmd</kbd>+<kbd>N</kbd> 新建文件，输入文字后按 <kbd>Cmd</kbd>+<kbd>S</kbd> 保存。</p>
<div class="sec"><div class="sec-t">🔤 英语小知识</div>
<div class="tip"><strong>VS Code</strong> 的全称是 <strong>Visual Studio Code</strong>。Visual = 可视化的，Studio = 工作室，Code = 代码。合起来就是"可视化代码工作室"！记住这几个英语单词，以后看英文文档就不怕了。</div></div>`},
        {title:'探索Scratch',auto:true,
        verify:{id:'v1_scratch',label:'在Scratch创建过项目',hint:'去 scratch.mit.edu 创建一个项目，保存到电脑'},
        subjects:['🖥️ 信息科技','🎨 艺术'],
        content:`
<p><strong>Scratch</strong>是MIT发明的编程工具，用积木块来写代码，就像搭乐高！</p>
<div class="qbtns"><a class="qbtn pri" href="https://scratch.mit.edu" target="_blank">🚀 打开Scratch</a></div>

// ==================== STATE ====================
let S = loadS();
let cur = null;
let verifyResults = {};

function loadS(){try{return JSON.parse(localStorage.getItem('kh-s'))||{done:{},steps:{},xp:0}}catch{return{done:{},steps:{},xp:0}}}
function saveS(){localStorage.setItem('kh-s',JSON.stringify(S))}

// ==================== STARS ====================
(function(){const c=document.getElementById('stars');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2.5+1;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s`;c.appendChild(s)}})();

// ==================== VERIFY ====================
async function verifyLevel(id){
    try{
        sndVerify();
        const r=await fetch(`http://localhost:18088/verify?level=${id}`);
        const data=await r.json();
        verifyResults[id]=data;
        if(data.summary&&data.summary.allAutoPassed) sndVerifyPass();
        else if(data.summary&&data.summary.autoPassed>0) sndVerifyPass();
        renderMap();
        if(cur===id) renderLevel(id);
        return data;
    }catch{
        // server not running, fallback to local-only
        verifyResults[id]={error:'server_offline'};
        renderMap();
        return null;
    }
}

async function refreshAll(){
    showToastI('🔄','正在验证所有关卡...');
    for(let i=1;i<=10;i++) await verifyLevel(i);
    showToastI('✅','验证完成！');
    sndVerifyPass();
    updateStats();
}

function getVerifyStatus(id){
    const r=verifyResults[id];
    if(!r||r.error) return 'unknown';
    if(r.summary&&r.summary.allAutoPassed) return 'ok';
    if(r.summary&&r.summary.autoPassed>0) return 'partial';
    return 'none';
}

// ==================== RENDER MAP ====================
function renderMap(){
    const m=document.getElementById('map');
    m.innerHTML=L.map(l=>{
        const d=S.done[l.id];
        const sk=`l${l.id}`;
        const done=l.steps.filter((_,i)=>S.steps[`${sk}s${i}`]).length;
        const tot=l.steps.length;
        const vs=getVerifyStatus(l.id);
        const vdot=vs==='ok'?'ok':vs==='partial'?'partial':'none';
        return`<div class="lvl ${cur===l.id?'on':''} ${d?'done':''}" onclick="selectLevel(${l.id})">
            <div class="ico" style="background:${d?'rgba(0,184,148,.18)':'rgba(108,92,231,.12)'}">
                ${l.icon}${d?'<div class="badge">✓</div>':''}
            </div>
            <div class="info"><div class="t">${l.title}</div><div class="s">${done}/${tot}步骤 · ${l.time}</div></div>
            <div class="verify-dot ${vdot}"></div>
        </div>`;
    }).join('');
}

// ==================== RENDER LEVEL ====================
function selectLevel(id){
    cur=id;
    const l=L.find(x=>x.id===id);
    const a=document.getElementById('content');
    const sk=`l${id}`;
    const vr=verifyResults[id];
    sndExpand();

    a.innerHTML=`
    <div class="hdr">
        <div class="bc">关卡 ${l.id}/${L.length}</div>
        <h1>${l.icon} ${l.title}</h1>
        <div class="desc">${l.desc}</div>
        <div class="chips">
            <span class="chip">⏰ ${l.time}</span>
            <span class="chip">📊 ${l.difficulty}</span>
            <span class="chip">⭐ ${l.xp} XP</span>
            ${l.subjects.map(s=>`<span class="chip">${s}</span>`).join('')}
        </div>
    </div>

    <div class="sec">
        <div class="sec-t">📋 任务步骤 <span style="font-size:.75em;color:var(--dim);font-weight:400">（绿色=系统自动验证，蓝色=人工确认）</span></div>
        ${l.steps.map((st,i)=>{
            const k=`${sk}s${i}`;
            const done=S.steps[k];
            // check verify result
            let vResult=null;
            if(vr&&vr.results) vResult=vr.results.find(r=>r.id===st.verify.id);
            const autoPassed=vResult?vResult.passed:false;
            const isDone=done||autoPassed;

            return`<div class="step ${isDone?'done':''} ${cur===id&&i===0?'expanded':''}" id="st${i}">
                <div class="step-h" onclick="toggleStep(${i})">
                    <div class="step-chk ${autoPassed?'auto-ok':''} ${done&&!autoPassed?'manual-ok':''}" onclick="event.stopPropagation();toggleStepDone(${id},${i})">
                        ${isDone?'✓':''}
                    </div>
                    <div class="step-num">${i+1}</div>
                    <div class="step-t">${st.title}</div>
                    ${st.subjects?st.subjects.map(s=>`<span class="subject ${s.includes('数学')?'math':s.includes('语文')?'chinese':s.includes('英语')?'english':s.includes('科学')?'science':s.includes('艺术')?'art':''}">${s}</span>`).join(''):''}
                    <span class="step-tag ${st.auto?'auto':'manual'}">${st.auto?'🤖自动':'🔘人工'}</span>
                    <div class="step-arrow">▶</div>
                </div>
                <div class="step-b">
                    ${renderVerifyBar(st,autoPassed,done)}
                    ${st.content}
                </div>
            </div>`;
        }).join('')}
    </div>

    <div class="done-sec">
        <button class="done-btn ${S.done[id]?'completed':''}" onclick="completeLvl(${id})">
            ${S.done[id]?'✅ 已完成！（点击取消）':'🏆 完成本关，领取成就！'}
        </button>
    </div>`;

    renderMap();
    updateStats();
    a.scrollTop=0;
}

function renderVerifyBar(st,autoPassed,manualDone){
    const v=st.verify;
    if(st.auto){
        if(autoPassed){
            return`<div class="verify-bar ok"><span class="v-icon">✅</span><span class="v-text">${v.label}</span><span style="color:var(--success);font-size:.85em">已通过</span></div>`;
        }else{
            return`<div class="verify-bar fail"><span class="v-icon">❌</span><span class="v-text">${v.label}</span><button class="v-btn check" onclick="verifyLevel(${cur})">🔍 检测</button></div>`;
        }
    }else{
        if(manualDone){
            return`<div class="verify-bar ok"><span class="v-icon">✅</span><span class="v-text">${v.label}</span><span style="color:var(--info);font-size:.85em">已确认</span></div>`;
        }else{
            return`<div class="verify-bar pending"><span class="v-icon">🔘</span><span class="v-text">${v.hint}</span><button class="v-btn check" onclick="toggleStepDone(${cur},${L.find(x=>x.id===cur).steps.indexOf(st)})">确认完成</button></div>`;
        }
    }
}

// ==================== INTERACTIONS ====================
function toggleStep(i){
    const el=document.getElementById(`st${i}`);
    const wasExpanded=el.classList.contains('expanded');
    el.classList.toggle('expanded');
    wasExpanded?sndCollapse():sndExpand();
}

function toggleStepDone(lid,si){
    const k=`l${lid}s${si}`;
    S.steps[k]=!S.steps[k];
    saveS();
    selectLevel(lid);
    if(S.steps[k]){showToastI('✅','步骤完成！');sndStepDone();sndXpUp();}
    // 同步到云端
    Sync.saveStepStatus(lid, si, S.steps[k]);
    Sync.debouncedSave();
}

function completeLvl(id){
    const l=L.find(x=>x.id===id);
    if(S.done[id]){delete S.done[id];S.xp-=l.xp}
    else{S.done[id]=true;S.xp+=l.xp;sndLevelDone();showToastI('🎉',`完成！获得 ${l.xp} XP`);fireConfetti();setTimeout(sndXpUp,400)}
    saveS();selectLevel(id);updateStats();
    // 同步到云端
    Sync.saveLevelStatus(id, !!S.done[id]);
    Sync.debouncedSave();
}

function copyCode(btn){
    const t=btn.parentElement.textContent.replace('复制','').replace(/^[^\n]*\n/,'').trim();
    navigator.clipboard.writeText(t).then(()=>{btn.textContent='已复制!';sndCopy();setTimeout(()=>btn.textContent='复制',1200)});
}

function runCmd(cmd){showToastI('💡',`请在终端输入: ${cmd}`)}

// ==================== STATS ====================
function updateStats(){
    const c=Object.keys(S.done).length;
    const mx=L.reduce((a,l)=>a+l.xp,0);
    document.getElementById('xp').textContent=S.xp;
    document.getElementById('badges').textContent=c;
    document.getElementById('works').textContent=Object.keys(S.steps).filter(k=>S.steps[k]).length;
    document.getElementById('xpF').style.width=`${Math.min(100,S.xp/mx*100)}%`;
    document.getElementById('xpL').textContent=`${S.xp} / ${mx} XP`;
}

// ==================== SOUND EFFECTS (Web Audio API) ====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

// 基础音符播放
function playTone(freq, duration, type='sine', volume=0.15, delay=0) {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration);
}

// 🔔 步骤完成 - 清脆上升叮咚
function sndStepDone() {
    playTone(523, 0.12, 'sine', 0.15);      // C5
    playTone(659, 0.12, 'sine', 0.15, 0.1);  // E5
    playTone(784, 0.2, 'sine', 0.18, 0.2);   // G5
}

// 🏆 关卡完成 - 欢快胜利小旋律
function sndLevelDone() {
    const notes = [523, 587, 659, 784, 880, 1047]; // C5 D5 E5 G5 A5 C6
    notes.forEach((n, i) => {
        playTone(n, 0.18, 'sine', 0.12, i * 0.1);
        playTone(n * 0.5, 0.18, 'triangle', 0.06, i * 0.1); // 低音和声
    });
    // 尾部和弦
    setTimeout(() => {
        playTone(523, 0.4, 'sine', 0.1);
        playTone(659, 0.4, 'sine', 0.1);
        playTone(784, 0.4, 'sine', 0.1);
    }, 650);
}

// 📋 复制代码 - 轻快点击
function sndCopy() {
    playTone(880, 0.06, 'square', 0.06);
    playTone(1320, 0.08, 'square', 0.05, 0.05);
}

// ▶️ 展开/折叠步骤 - 柔和滑音
function sndExpand() {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
function sndCollapse() {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}

// ⬆️ XP增加 - 上升音
function sndXpUp() {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.25);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
}

// ==================== EFFECTS ====================
function showToastI(icon,text){
    const t=document.getElementById('toast');
    document.getElementById('toastI').textContent=icon;
    document.getElementById('toastT').textContent=text;
    t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);

function fireConfetti(){
    const c=document.getElementById('confetti');c.innerHTML='';
    const cols=['#6c5ce7','#a29bfe','#fd79a8','#fdcb6e','#00b894','#74b9ff','#e17055'];
    for(let i=0;i<50;i++){const p=document.createElement('div');p.className='c-piece';p.style.cssText=`left:${Math.random()*100}%;background:${cols[i%7]};--d:${Math.random()*2+1.5}s;animation-delay:${Math.random()*.4}s;border-radius:${Math.random()>.5?'50%':'2px'};width:${Math.random()*7+5}px;height:${Math.random()*7+5}px`;c.appendChild(p)}
    setTimeout(()=>c.innerHTML='',3500);
    sndConfetti();
}

// ==================== CLOUD INIT ====================
async function initApp() {
    const status = await Auth.init();

    if (status === 'needs_migration') {
        // 有本地数据，提示登录并迁移
        Auth.showAuthModal(true);
    } else if (status === 'needs_setup') {
        // 全新用户
        Auth.showAuthModal(false);
    } else if (status === 'offline') {
        // 离线模式，继续使用 localStorage
        console.log('Running in offline mode');
    }

    if (Auth.isLoggedIn()) {
        // 从云端同步数据
        await Sync.syncFromCloud();
        Auth.updateUI();
        Auth.updateActivity();
    }
}

// 页面加载后初始化
initApp();

// 按钮悬停音效（仅对.qbtn和.done-btn生效，限制触发频率）
let hoverCooldown = false;
document.addEventListener('mouseover', function(e) {
    if (hoverCooldown) return;
    const btn = e.target.closest('.qbtn, .done-btn');
    if (!btn) return;
    hoverCooldown = true;
    sndHover();
    setTimeout(() => hoverCooldown = false, 100);
});

// 首次交互时播放欢迎音（浏览器要求用户交互后才能播放音频）
let welcomePlayed = false;
document.addEventListener('click', function playWelcomeOnce() {
    if (welcomePlayed) return;
    welcomePlayed = true;
    sndWelcome();
    document.removeEventListener('click', playWelcomeOnce);
}, { once: true });
